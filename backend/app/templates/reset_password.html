<!DOCTYPE html>
<html>
<body style="font-family: Arial; background:#f4f4f4; padding:20px;">
  <div style="max-width:500px; margin:auto; background:#ffffff; padding:20px; border-radius:10px; text-align:center;">
    
    <h2 style="color:#6A1B9A;">FFT Church</h2>
    <p>HIM We Proclaim 🙏</p>

    <h3>Reset Your Password</h3>

    <p style="margin:20px 0; color:#555;">
      Click the button below to reset your password.
    </p>

    <a href="{{ reset_link }}" 
       style="display:inline-block; padding:12px 20px; background:#6A1B9A; color:#fff; text-decoration:none; border-radius:6px; font-weight:bold;">
       Reset Password
    </a>

    <p style="margin-top:20px; font-size:14px;">
      Or copy this link:
    </p>

    <p style="word-break:break-all; font-size:12px; color:#333;">
      {{ reset_link }}
    </p>

    <p style="margin-top:15px; font-size:12px; color:#888;">
      This link will expire in 15 minutes.
    </p>

    <p style="font-size:12px; color:#888;">
      If you did not request this, please ignore this email.
    </p>

  </div>
</body>
</html>
